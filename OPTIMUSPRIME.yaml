# PRIME DIRECTIVE — COMMANDMENT ZERO
# ═══════════════════════════════════════════════════════════════════════════

prime_directive:
  commandment_number: 0
  title: "95% CONFIDENCE"
  priority: "ABSOLUTE"
  supersedes: "ALL other commandments"

  principle: |
    ╔═══════════════════════════════════════════════════════════════╗
    ║                                                               ║
    ║                  95% CONFIDENCE REQUIRED                      ║
    ║                                                               ║
    ║                    THE PRIME DIRECTIVE                        ║
    ║                                                               ║
    ╚═══════════════════════════════════════════════════════════════╝

    BEFORE any code, script, or decision:
    Achieve 95% confidence it delivers the intended outcome.

    If confidence < 95%:
      → STOP
      → ASK
      → DO NOT ASSUME
      → DO NOT PROCEED

  assessment:
    requirements:
      questions:
        - "Can I explain the outcome in ONE sentence?"
        - "Do I know the exact inputs and outputs?"
        - "Have I asked all clarifying questions?"
      target: 95

    data_understanding:
      questions:
        - "Do I know the data structure?"
        - "Have I tested with sample data?"
        - "Have I documented edge cases?"
      target: 95

    business_alignment:
      questions:
        - "How does this advance the goal?"
        - "What decision will this enable?"
        - "Is there a simpler way?"
      target: 95

  decision_tree:
    confidence_95_plus:
      status: "✅ GO"
      action: "Proceed"

    confidence_85_to_94:
      status: "⚠️ CAUTION"
      action: "Proceed with documented risks"

    confidence_below_85:
      status: "❌ NO-GO"
      action: "Stop. Clarify. Re-assess."

# ═══════════════════════════════════════════════════════════════════════════
# THE 10 COMMANDMENTS
# ═══════════════════════════════════════════════════════════════════════════

commandments:

  # ─────────────────────────────────────────────────────────────────────────
  # I. LAYER ARCHITECTURE
  # ─────────────────────────────────────────────────────────────────────────

  - id: 1
    title: "Layer Architecture"
    essence: "L1 → L2 → L3. Dependencies flow down, never up."

    principle: |
      L1: Independent scripts. External sources. Raw data.
      L2: Depends on L1 only. Transforms. Enriches.
      L3: Depends on L2 only. Final output. Business logic.

      Dependencies flow downward. Never upward. Never sideways.

    structure: |
      /l1_extraction        # Independent: APIs, databases, uploads
          extract_emails.ts
      /l2_transformation    # Depends on L1: transform, enrich, dedupe
          categorize_replies.ts
      /l3_aggregation       # Depends on L2: merge, report, deliver
          final_merge.ts

    naming: "l{n}_{descriptive_name}"

  # ─────────────────────────────────────────────────────────────────────────
  # II. ROUND STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────

  - id: 2
    title: "Round Structure"
    essence: "Each round is self-contained. Outputs, logs, learnings together."

    principle: |
      A round is an experiment.
      It has inputs, outputs, logs, and learnings.
      It is self-contained. Reproducible. Documented.

    structure: |
      /round_04_conversation_threading
          /inputs              # INPUTS_MANIFEST.md (pointers, not copies)
          /outputs             # Data files (JSON, CSV)
          /logs                # Execution logs (timestamped)
              /l1_extraction
              /l2_transformation
          /l1_extraction       # Layer 1 scripts
          /l2_transformation   # Layer 2 scripts
          learnings.md         # 4-section experimental format
          README.md            # Round overview

    naming: "round_{nn}_{descriptive_goal}"

  # ─────────────────────────────────────────────────────────────────────────
  # III. NAMING STANDARDS
  # ─────────────────────────────────────────────────────────────────────────

  - id: 3
    title: "Naming Standards"
    essence: "Descriptive. No versions. No generics. Self-explanatory."

    principle: |
      Names should explain themselves without reading code.
      No test1.ts. No output.json. No final_v3.

    formats:
      scripts: "{action}_{object}.ts"
      outputs: "{scope}_{description}.{ext}"
      logs: "{script}_{YYYY-MM-DD_HH-mm-ss}.log"

    examples:
      good:
        - "extract_all_conversations.ts"
        - "all_conversations_by_lead.json"
        - "extract_conversations_2025-01-21_10-55-21.log"
      bad:
        - "script1.ts"
        - "output.json"
        - "log.txt"

  # ─────────────────────────────────────────────────────────────────────────
  # IV. DOCUMENT DEPENDENCIES
  # ─────────────────────────────────────────────────────────────────────────

  - id: 4
    title: "Document Dependencies"
    essence: "INPUTS_MANIFEST.md. Pointers, not copies. Explain why."

    principle: |
      Never copy files to /inputs.
      Document dependencies in INPUTS_MANIFEST.md.
      Include: source path, schema, size, why needed.

    template: |
      # Round 4 - Input Dependencies

      ## all_conversations_by_lead.json
      - **Source**: `../round_03/outputs/all_conversations_by_lead.json`
      - **Records**: 978 leads
      - **Schema**: `{ lead_email, messages[] }`
      - **Why Needed**: Threading requires raw conversations
      - **Used By**: L2 scripts

      ## Environment Variables
      - `FIREBASE_PROJECT_ID`
      - `FIREBASE_PRIVATE_KEY`

  # ─────────────────────────────────────────────────────────────────────────
  # V. EXPERIMENTAL LEARNINGS
  # ─────────────────────────────────────────────────────────────────────────

  - id: 5
    title: "Experimental Learnings"
    essence: "4-section format. What, Why, Results, Conclusions."

    principle: |
      Every round has learnings.md.
      Every experiment follows the 4-section format.
      Document confidence. Include failures.

    four_sections:
      1_what: "What we're testing. Hypothesis. Techniques."
      2_why: "Current status. Knowledge gaps. Why this unblocks progress."
      3_results: "What we discovered. Data quality. Confidence level."
      4_conclusions: "Constraints clarified. Assumptions validated/invalidated. Next steps."

    template: |
      ## Experiment 1: Conversation Threading

      ### 1. What We're Testing
      - **Hypothesis**: Replies stored in same collection as sent emails
      - **Technique**: Query Firestore, filter by type field

      ### 2. Why We're Running This
      - **Gap**: Don't know where replies are stored
      - **Unblocks**: Conversation view requires both sent and received

      ### 3. Results
      - **Found**: type field distinguishes sent/received
      - **Confidence**: 95% ✅

      ### 4. Conclusions
      - **Validated**: ✅ Replies in same collection
      - **Next**: Analyze reply categories

  # ─────────────────────────────────────────────────────────────────────────
  # VI. LOGS VS OUTPUTS
  # ─────────────────────────────────────────────────────────────────────────

  - id: 6
    title: "Logs vs Outputs"
    essence: "Outputs are data. Logs are traces. Never mix."

    principle: |
      OUTPUTS: Data files. Consumed by scripts or humans.
      - JSON, CSV, final deliverables
      - No timestamps in filenames
      - Versioned via git

      LOGS: Execution traces. For debugging.
      - Console output, errors, performance
      - Always timestamped
      - Organized by layer subfolders
      - Ephemeral (can delete)

    log_structure: |
      /logs
          /l1_extraction
              extract_emails_2025-01-21_10-55-21.log
          /l2_transformation
              categorize_replies_2025-01-21_11-30-00.log

  # ─────────────────────────────────────────────────────────────────────────
  # VII. PLAN BEFORE ACTION
  # ─────────────────────────────────────────────────────────────────────────

  - id: 7
    title: "Plan Before Action"
    essence: "Clarify. Document constraints. Identify risks. Then execute."

    principle: |
      Before any script, round, or decision:

      1. CLARIFY: What is the business outcome? (one sentence)
      2. CONSTRAINTS: Data structure, auth, rate limits, size
      3. RISKS: What if API times out? Data changes? Auth expires?
      4. EDGE CASES: Empty results, malformed data, duplicates
      5. VALIDATE: Is there a simpler way?

      Only then: execute.

    checklist: |
      □ Business outcome defined (one sentence)
      □ Input sources identified
      □ Output format specified
      □ Edge cases documented
      □ Failure scenarios considered
      □ Confidence assessed

  # ─────────────────────────────────────────────────────────────────────────
  # VIII. TEST SMALL FIRST
  # ─────────────────────────────────────────────────────────────────────────

  - id: 8
    title: "Test Small First"
    essence: "10 records before 10,000. Validate before committing."

    principle: |
      Minimal Viable Test (MVT) first.

      - Test with 10 records, not 10,000
      - Validate structure before full run
      - Fast feedback over complete data
      - Build on previous rounds (incremental)
      - Don't build L3 if L1 is sufficient

    pattern: |
      // Test mode
      const TEST_MODE = true
      const LIMIT = TEST_MODE ? 10 : undefined

      const results = await query({ limit: LIMIT })

      // Validate structure
      console.log('Sample:', results[0])
      console.log('Count:', results.length)

  # ─────────────────────────────────────────────────────────────────────────
  # IX. AGGREGATE KNOWLEDGE
  # ─────────────────────────────────────────────────────────────────────────

  - id: 9
    title: "Aggregate Knowledge"
    essence: "Cross-round insights. Patterns. Anti-patterns. Decisions enabled."

    principle: |
      At /testing root, maintain:

      - ROUNDS_INDEX.md: Quick reference for all rounds
      - LEARNINGS_AGGREGATED.md: Cross-round insights, patterns
      - CONVENTIONS.md: Standards reference

      Update after each round completion.

    aggregated_format: |
      # Aggregated Learnings

      ## Critical Discoveries
      - Replies stored in emails collection (Round 4)
      - 4.1% reply rate is accurate (Round 5)

      ## Patterns
      - Campaign-based threading, not email-thread-id

      ## Anti-Patterns
      - Don't copy files to /inputs (use MANIFEST)

      ## Decisions Enabled
      - Can build conversation view (Round 4 validated)

  # ─────────────────────────────────────────────────────────────────────────
  # X. VISUAL COMMUNICATION
  # ─────────────────────────────────────────────────────────────────────────

  - id: 10
    title: "Visual Communication"
    essence: "ASCII diagrams for structure and flow. Faster comprehension."

    principle: |
      Use ASCII art for:
      - Architecture diagrams
      - Data flow (L1 → L2 → L3)
      - Dependency graphs
      - Process flows

    example: |
      ┌─────────────────────────────────────────┐
      │  Round 4: Conversation Threading        │
      └─────────────────────────────────────────┘
               │
               ├─→ L1: Extract Emails
               │   └─ Output: raw_emails.json
               │
               ├─→ L2: Categorize Replies
               │   └─ Output: categorized.json
               │
               └─→ L3: Thread Conversations
                   └─ Output: threaded.json

    formatting:
      boxes: "╔═══╗ ║ ║ ╚═══╝"
      lines: "───"
      arrows: "→ ← ↑ ↓"
      tree: "├─ └─"

# ═══════════════════════════════════════════════════════════════════════════
# THE FIVE GATES
# Quality Checkpoints Before Delivery
# ═══════════════════════════════════════════════════════════════════════════

quality_gates:
  philosophy: |
    Five gates stand between experiment and delivery.
    Each gate is a question. The work must answer.

  gate_1:
    question: "Is confidence ≥95%?"
    checks: ["Requirements clear", "Data understood", "Business aligned"]

  gate_2:
    question: "Is it structured?"
    checks: ["L1/L2/L3 correct", "Round structure complete", "Dependencies documented"]

  gate_3:
    question: "Is it documented?"
    checks: ["Learnings.md complete", "4-section format", "Confidence assessed"]

  gate_4:
    question: "Is it tested?"
    checks: ["MVT run first", "Edge cases handled", "Failures documented"]

  gate_5:
    question: "Is it aggregated?"
    checks: ["ROUNDS_INDEX updated", "Cross-round insights captured"]

