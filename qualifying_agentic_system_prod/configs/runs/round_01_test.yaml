# ═══════════════════════════════════════════════════════════════
# ROUND 01 TEST RUN CONFIGURATION
# ═══════════════════════════════════════════════════════════════
# Purpose: Initial testing of iterative qualification system
# Date: 2025-12-14
# Status: TESTING
# ═══════════════════════════════════════════════════════════════

# WHO - Client identification
client: "poka_labs"

# WHAT - Input source
input:
  # CSV file with domains
  file: "testing/round_01_map_and_homepage_qualification/inputs/test_domains.csv"
  # CSV should have columns: domain (required), company_name (optional)

# HOW - Analysis specification
analysis_spec: "poka_labs_chemical_qualification_v2"

# ═══════════════════════════════════════════════════════════════
# ITERATION SETTINGS
# ═══════════════════════════════════════════════════════════════

iteration:
  max_pages: 11          # 1 homepage + 5 round1 + 5 round2
  pages_per_round: 5     # Pages selected per iteration
  max_iterations: 2      # Max rounds after homepage

  # Stop early if all critical questions have HIGH confidence
  early_stop: true
  confidence_threshold: "MEDIUM"  # Stop if all questions at least this

  # Critical questions that must have good confidence
  critical_questions:
    - "sells_products"
    - "product_type"
    - "primary_category"

# ═══════════════════════════════════════════════════════════════
# COST & PERFORMANCE
# ═══════════════════════════════════════════════════════════════

max_cost_usd: 100

# Concurrency settings (matching search_system_prod)
concurrency:
  firecrawl: 50    # Parallel Firecrawl requests
  claude: 30       # Parallel Claude requests

# Rate limiting
rate_limits:
  firecrawl_delay_ms: 100   # Delay between Firecrawl calls
  claude_delay_ms: 200      # Delay between Claude calls

# ═══════════════════════════════════════════════════════════════
# TEST MODE
# ═══════════════════════════════════════════════════════════════

# Process only first N domains (for testing)
test_mode: 5

# Dry run - validate config without API calls
dry_run: false

# ═══════════════════════════════════════════════════════════════
# FIRECRAWL OPTIONS
# ═══════════════════════════════════════════════════════════════

firecrawl:
  map_limit: 5000
  scrape:
    formats:
      - "markdown"
    only_main_content: true
    timeout: 30000

# ═══════════════════════════════════════════════════════════════
# CLAUDE OPTIONS
# ═══════════════════════════════════════════════════════════════

claude:
  model: "claude-sonnet-4-20250514"
  max_tokens: 2000
  temperature: 0

# ═══════════════════════════════════════════════════════════════
# OUTPUT OPTIONS
# ═══════════════════════════════════════════════════════════════

output:
  format: "json"           # json for now, csv later
  include_evidence: true   # Include evidence excerpts
  include_confidence: true # Include per-question confidence

# ═══════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════

logging:
  level: "INFO"
  log_to_file: true
  log_dir: "testing/round_01_map_and_homepage_qualification/logs/l2_iterative_qualify"
