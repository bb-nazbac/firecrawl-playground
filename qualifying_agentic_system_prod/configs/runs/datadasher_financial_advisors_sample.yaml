# DataDasher - Financial Advisors Qualification (Sample Test)
# Test run on 10 domains before full batch

client: "datadasher"

input:
  file: "/Users/bahaa/Documents/Clients/firecrawl_playground/search_system_prod/outputs/datadasher/run_20260122_100631/domains.csv"

analysis_spec: "datadasher_financial_advisor_qualification"

iteration:
  max_pages: 6  # 1 homepage + 5 additional pages
  pages_per_round: 5
  max_rounds: 1
  confidence_threshold: "medium"

max_cost_usd: 10

concurrency: 5

api_delay_ms: 200

# Test on 10 domains first
test_mode: 10

dry_run: false

firecrawl:
  map_limit: 100
  scrape:
    formats:
      - "markdown"
    only_main_content: true
    timeout: 30000

output:
  include_markdown: false
  include_map: false
  format: "csv"
