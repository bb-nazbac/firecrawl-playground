# ═══════════════════════════════════════════════════════════════════════════
# PRIME DIRECTIVE - COMMANDMENT #0
# ═══════════════════════════════════════════════════════════════════════════

prime_directive:
  commandment_number: 0
  title: "95% CONFIDENCE - THE PRIME DIRECTIVE"
  priority: "ABSOLUTE"
  supersedes: "ALL other commandments"

  core_principle: |
    ╔═══════════════════════════════════════════════════════════════╗
    ║                                                               ║
    ║             95% CONFIDENCE REQUIRED                           ║
    ║                                                               ║
    ║              THE PRIME DIRECTIVE                              ║
    ║           ALL WORK MUST MEET THIS BAR                         ║
    ║                                                               ║
    ╚═══════════════════════════════════════════════════════════════╝

    BEFORE any code, script, round, test, or decision:
    YOU MUST achieve 95% confidence that it delivers the
    intended business outcome.

    If confidence < 95%:
      → STOP
      → ASK QUESTIONS
      → DO NOT ASSUME
      → DO NOT PROCEED

    This overrides ALL other commandments.
    When in doubt: STOP and CLARIFY.

  mandatory_checklist:
    requirements_clarity:
      target_confidence: 95
      questions:
        - "Can I explain the business outcome in ONE sentence?"
        - "Do I know EXACTLY what inputs are required?"
        - "Do I know EXACTLY what output format is expected?"
        - "Have I asked ALL clarifying questions?"
        - "Has the user validated my understanding?"

      scoring_rubric:
        all_yes:
          confidence: 95
          action: "PROCEED"
        four_yes:
          confidence: 80
          action: "ASK remaining questions before proceeding"
        three_or_fewer:
          confidence: "<75"
          action: "STOP. Cannot proceed. Request comprehensive briefing."

    data_understanding:
      target_confidence: 95
      questions:
        - "Do I know exact data source structure (collections, fields, types)?"
        - "Have I tested with sample data?"
        - "Do I understand all field types and their meanings?"
        - "Have I documented edge cases?"
        - "Have I tested failure scenarios?"

      scoring_rubric:
        all_yes:
          confidence: 95
          action: "PROCEED"
        three_or_fewer:
          confidence: "<85"
          action: "STOP. Research and test before proceeding."

    edge_case_coverage:
      target_confidence: 90
      questions:
        - "What happens if input data is empty?"
        - "What happens if API/database times out?"
        - "What happens if data format is unexpected?"
        - "What happens if authentication expires?"
        - "Have I tested the most likely failure scenario?"

      min_confidence: 85
      action_if_below: "Document gaps. Proceed with caution. Add error handling."

    business_outcome_alignment:
      target_confidence: 95
      questions:
        - "How does this work advance the business goal?"
        - "What decision will this enable?"
        - "What happens if we skip this work?"
        - "Is there a simpler way to achieve the same outcome?"

      scoring_rubric:
        all_yes:
          confidence: 95
          action: "PROCEED - work is justified"
        unclear:
          confidence: "<85"
          action: "STOP. Clarify business value before proceeding."

  decision_tree:
    confidence_95_plus:
      status: "✅ GO"
      action: "PROCEED with work"
      requirements:
        - "Document confidence assessment in logs/learnings"
        - "Note any remaining uncertainties (<5%)"
        - "Proceed with confidence"

    confidence_85_to_94:
      status: "⚠️ CAUTION"
      action: "PROCEED WITH DOCUMENTED RISKS"
      requirements:
        - "Document specific confidence blockers"
        - "Add validation steps to raise confidence"
        - "Plan to revisit and improve confidence post-execution"
        - "Inform user of confidence gaps"

    confidence_below_85:
      status: "❌ NO-GO"
      action: "STOP - DO NOT PROCEED"
      requirements:
        - "List specific confidence gaps"
        - "Ask user targeted clarifying questions"
        - "Research/test to fill knowledge gaps"
        - "Re-assess confidence after clarification"
        - "Only proceed when confidence ≥85%"

  confidence_assessment_template: |
    ═══════════════════════════════════════════════════════════════
    CONFIDENCE ASSESSMENT
    ═══════════════════════════════════════════════════════════════

    Requirements Clarity:        ___%  [Target: 95%+]
    Data Source Understanding:   ___%  [Target: 95%+]
    Edge Case Coverage:          ___%  [Target: 90%+]
    Business Outcome Alignment:  ___%  [Target: 95%+]

    OVERALL CONFIDENCE: ___%

    ═══════════════════════════════════════════════════════════════
    DECISION: [✅ GO | ⚠️ CAUTION | ❌ NO-GO]
    ═══════════════════════════════════════════════════════════════

    Confidence Boosters (what increased confidence):
    - [List factors that increased confidence]

    Confidence Blockers (what limits confidence):
    - [List gaps or unknowns]

    Path to 95%+ (if below target):
    - [List actions needed to raise confidence]

    ═══════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════
# COMMANDMENTS 1-11
# ═══════════════════════════════════════════════════════════════════════════

commandments:

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 1: LAYER-BASED ARCHITECTURE
  # ─────────────────────────────────────────────────────────────────────────

  - id: 1
    title: "Layer-Based Architecture (L1/L2/L3)"
    priority: "critical"
    applies_to: "Production AND Testing code"

    confidence_checkpoint:
      question: "Are you 95% confident L1/L2/L3 is correctly applied?"
      validation_checklist:
        - "L1 scripts have NO dependencies on other script outputs"
        - "L2 scripts ONLY depend on L1 outputs"
        - "L3 scripts ONLY depend on L2 outputs"
        - "Dependencies flow downward (L1 → L2 → L3), NEVER upward"

    core_principles:
      - "Dependencies flow downward: L1 → L2 → L3, NEVER upward"
      - "Multiple L1/L2/L3 folders allowed per round"
      - "Production AND testing use identical layering principles"

    layer_definitions:
      L1:
        name: "Layer 1 - Independent Scripts"
        dependencies: "None (runs independently)"
        input: "External sources (APIs, databases, user uploads)"
        output: "Raw extracted data"
        examples:
          - "API calls"
          - "Database queries"
          - "Initial data extraction"
          - "l1_firestore_extraction"
          - "l1_api_campaign_data"

      L2:
        name: "Layer 2 - Dependent Transformations"
        dependencies: "L1 outputs only"
        input: "L1 output files"
        output: "Processed/enriched data"
        examples:
          - "Data transformation"
          - "Enrichment"
          - "Deduplication"
          - "Categorization"
          - "l2_reply_categorization"
          - "l2_contact_deduplication"

      L3:
        name: "Layer 3 - Final Processing"
        dependencies: "L2 outputs only"
        input: "L2 output files"
        output: "Final deliverable data"
        examples:
          - "Final merging"
          - "Aggregation"
          - "Business logic application"
          - "Reporting"
          - "l3_conversation_threading"
          - "l3_final_merge"

    folder_naming:
      format: "l{n}_{descriptive_name}"
      rules:
        - "Single digit layer number (l1, l2, l3)"
        - "Descriptive name of transformation or source"
        - "One folder can contain multiple related scripts"
      examples:
        good:
          - "l1_firestore_email_extraction"
          - "l2_reply_categorization"
          - "l3_final_merge"
        bad:
          - "layer1"
          - "l1"
          - "extraction"

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 2: ROUND-BASED TESTING STRUCTURE
  # ─────────────────────────────────────────────────────────────────────────

  - id: 2
    title: "Round-Based Testing Structure"
    priority: "critical"
    applies_to: "All testing and exploration work"

    confidence_checkpoint:
      question: "Are you 95% confident round structure is correct?"
      validation_checklist:
        - "Round has unique descriptive name"
        - "All subdirectories present (inputs, outputs, logs, layers)"
        - "INPUTS_MANIFEST.md documents dependencies"
        - "learnings.md uses 4-section experimental format"

    core_principles:
      - "Each round is SELF-CONTAINED (outputs, logs, learnings together)"
      - "Multiple L1/L2/L3 folders allowed per round"
      - "Round names are DESCRIPTIVE: round_{n}_{descriptive_goal}"
      - "Each round has its own learnings.md (experimental methodology)"
      - "Log files organized by layer in subfolders"

    directory_structure: |
      /testing
          /round_{nn}_{descriptive_name}
              /inputs                    # Dependency pointers (MANIFEST only)
                  INPUTS_MANIFEST.md     # Documents source files (NO copies)
              /outputs                   # Data files (JSON, CSV, etc.)
              /logs                      # Execution logs (timestamped)
                  /l1_{layer_name}       # L1 layer logs
                  /l2_{layer_name}       # L2 layer logs
                  /l3_{layer_name}       # L3 layer logs (if exists)
              /l1_{descriptive_name}     # Independent scripts
                  script1.ts
                  script2.ts
                  README.md              # Layer documentation
              /l2_{descriptive_name}     # Dependent scripts
                  script1.ts
                  README.md
              /l3_{descriptive_name}     # Final processing (if needed)
                  script1.ts
                  README.md
              learnings.md               # Experimental findings (4-section format)
              README.md                  # Round overview

    folder_naming:
      format: "round_{nn}_{descriptive_goal}"
      rules:
        - "Two-digit numbers: 01, 02, not 1, 2"
        - "Keep names SHORT (3-4 words max after number)"
        - "Descriptive of PRIMARY goal, not all activities"
        - "Details go in README.md, not folder name"
      examples:
        good:
          - "round_01_initial_firestore_exploration"
          - "round_04_conversation_threading"
        bad:
          - "round_1"
          - "round_04_complete_conversation_threading_with_reply_categorization_and_sentiment"

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 3: NAMING CONVENTIONS
  # ─────────────────────────────────────────────────────────────────────────

  - id: 3
    title: "Naming Conventions & Standards"
    priority: "high"

    confidence_checkpoint:
      question: "Are all files and folders named according to conventions?"
      validation_checklist:
        - "No generic names (test1, script2, output.json)"
        - "No version numbers in names (v2, final_v3)"
        - "Descriptive and self-explanatory"
        - "Follow format specifications below"

    scripts:
      format: "{descriptive_action}_{object}.ts"
      rules:
        - "Action verb + object"
        - "No numbering, no versioning"
        - "Self-explanatory without reading code"
      examples:
        good:
          - "extract_all_conversations.ts"
          - "categorize_replies.ts"
          - "merge_contact_data.ts"
        bad:
          - "script1.ts"
          - "test.ts"
          - "final_v3.ts"

    outputs:
      format: "{scope}_{description}.{ext}"
      rules:
        - "Include scope (all, complete, subset, etc.)"
        - "Descriptive of contents"
        - "NO timestamps (use logs for that)"
      examples:
        good:
          - "all_conversations_by_lead.json"
          - "reply_categories_summary.csv"
          - "email_stats_complete.json"
        bad:
          - "output.json"
          - "data.json"
          - "results_2025-10-21.json"

    logs:
      format: "{script_name}_{YYYY-MM-DD_HH-mm-ss}.log"
      rules:
        - "MUST include timestamp (ISO format with hyphens)"
        - "One log per script execution"
        - "Stored in /logs/l{n}_{layer_name}/ subfolder"
      examples:
        good:
          - "extract_conversations_2025-10-21_10-55-21.log"
          - "categorize_replies_2025-10-21_11-30-00.log"
        bad:
          - "log.txt"
          - "extract_conversations.log"

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 4: CROSS-ROUND DEPENDENCIES
  # ─────────────────────────────────────────────────────────────────────────

  - id: 4
    title: "Cross-Round Dependencies (/inputs)"
    priority: "high"

    confidence_checkpoint:
      question: "Are all dependencies documented in INPUTS_MANIFEST.md?"
      validation_checklist:
        - "INPUTS_MANIFEST.md exists in /inputs folder"
        - "All source paths documented (relative paths)"
        - "Schema/structure documented for each dependency"
        - "Why each input is needed is explained"
        - "Validation steps included"

    core_principles:
      - "NEVER copy actual files to /inputs folder"
      - "ALWAYS document dependencies via INPUTS_MANIFEST.md"
      - "Use relative paths from current round to source"
      - "Include schema, size, record counts"
      - "Explain WHY each dependency is needed"

    inputs_manifest_template: |
      # Round {N} - Input Dependencies

      ## Dependency 1: {File Name}

      - **Source Path**: `../round_{n}/outputs/{filename}`
      - **Size**: X MB
      - **Records**: N records
      - **Date Created**: YYYY-MM-DD
      - **Schema**:
        ```json
        {
          "field1": "type (description)",
          "field2": "type (description)"
        }
        ```
      - **Why Needed**: {Explanation of why this layer needs this input}
      - **Used By**: L{n}_{layer_name} scripts
      - **Validation**:
        - Check file exists: `test -f ../round_{n}/outputs/{filename}`
        - Verify record count: Should be ~N records

      ## External Dependencies

      **API Endpoints** (if any):
      - Endpoint: https://api.example.com/v1/data
      - Auth: Environment variable `API_KEY`

      **Database Connections** (if any):
      - Firestore: Project ID from `NEXT_PUBLIC_FIREBASE_PROJECT_ID`
      - Collection: `organizations/{org}/emails`

      **Environment Variables Required**:
      - `FIREBASE_PROJECT_ID`
      - `FIREBASE_CLIENT_EMAIL`
      - `FIREBASE_PRIVATE_KEY`

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 5: PER-ROUND LEARNINGS DOCUMENTATION
  # ─────────────────────────────────────────────────────────────────────────

  - id: 5
    title: "Per-Round Learnings (Experimental Methodology)"
    priority: "critical"

    confidence_checkpoint:
      question: "Does learnings.md follow 4-section format with confidence assessment?"
      validation_checklist:
        - "Non-negotiable statement present"
        - "Each experiment has all 4 sections"
        - "Confidence level documented per experiment"
        - "Overall round confidence assessed"

    core_principles:
      - "Each round has learnings.md at round root"
      - "Use 4-section experimental format (mandatory)"
      - "Document confidence levels"
      - "Include both successes AND failures"

    four_section_format:
      section_1:
        title: "What We're Testing"
        contents:
          - "Endpoints/Collections queried"
          - "Expected learning outcome"
          - "Techniques used"
          - "Hypothesis"

      section_2:
        title: "Why We're Running This"
        contents:
          - "Current project status"
          - "Current knowledge gaps"
          - "Why this test unblocks progress"

      section_3:
        title: "Results"
        contents:
          - "What we discovered"
          - "Data quality/completeness"
          - "Confidence level (with justification)"
          - "Unexpected findings"

      section_4:
        title: "Conclusions & Next Steps"
        contents:
          - "How results clarify constraints"
          - "How results expand possibilities"
          - "Validated assumptions"
          - "Invalidated assumptions"
          - "Next experiment required"

    learnings_template: |
      # Round {N}: {Descriptive Name} - Learnings

      **Date**: YYYY-MM-DD
      **Status**: ✅ Complete | 🚧 In Progress | ⏸️ Paused
      **Overall Confidence**: X%

      ═══════════════════════════════════════════════════════════════

      ## Non-Negotiable Statement

      We have business requirements that demand 95% confidence in data
      pipeline robustness. This round achieves confidence through:
      1. Systematic experimentation on data sources
      2. Validation that each test is sound and valuable
      3. Complete understanding of data structure and business impact

      ═══════════════════════════════════════════════════════════════

      ## Experiment 1: {Experiment Name}

      ### 1. What We're Testing

      **Endpoints/Collections**:
      - {List}

      **Expected Learning Outcome**:
      - {What we hope to discover}

      **Techniques Used**:
      - {Methods}

      **Hypothesis**:
      - {What we believe is true}

      ### 2. Why We're Running This

      **Current Project Status**:
      - {Where we are}

      **Current Knowledge Gaps**:
      - {What we don't know}

      **Why This Test Unblocks Progress**:
      - {How this enables next steps}

      ### 3. Results

      **What We Discovered**:
      - {Findings}

      **Data Quality/Completeness**:
      - {Assessment}

      **Confidence Level**: X% [✅/⚠️/❌]
      - {Justification for confidence score}

      **Unexpected Findings**:
      - {Surprises}

      ### 4. Conclusions & Next Steps

      **How Results Clarify Constraints**:
      - {Limitations discovered}

      **How Results Expand Possibilities**:
      - {New options unlocked}

      **Validated Assumptions**:
      - ✅ {What we proved correct}

      **Invalidated Assumptions**:
      - ❌ {What we proved wrong}

      **Next Experiment Required**:
      - {What to test next}

      ═══════════════════════════════════════════════════════════════

      ## Confidence Assessment

      | Component | Confidence | Status | Notes |
      |-----------|------------|--------|-------|
      | Input Data Understanding | X% | ✅/⚠️/❌ | {Why} |
      | Output Completeness | X% | ✅/⚠️/❌ | {Why} |
      | Edge Case Coverage | X% | ✅/⚠️/❌ | {Why} |
      | Business Outcome Alignment | X% | ✅/⚠️/❌ | {Why} |

      **Overall Round Confidence: X%** [✅/⚠️/❌]

      **Confidence Boosters**:
      - {What increased confidence}

      **Confidence Blockers**:
      - {What limits confidence}

      **Path to 95%+**:
      - {Actions to raise confidence}

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 6: TOP-LEVEL AGGREGATOR DOCUMENTATION
  # ─────────────────────────────────────────────────────────────────────────

  - id: 6
    title: "Top-Level Aggregator Documentation"
    priority: "medium"
    location: "/testing root"

    required_files:
      - "ROUNDS_INDEX.md"
      - "LEARNINGS_AGGREGATED.md"
      - "CONVENTIONS.md"
      - "README.md"
      - "_TEMPLATE_ROUND/"

    rounds_index:
      purpose: "Quick reference for all rounds"
      format: "Table + summaries"
      update_frequency: "After each round completion"

    learnings_aggregated:
      purpose: "Cross-round insights and patterns"
      format: "Thematic sections (not per-round)"
      contents:
        - "Critical discoveries"
        - "Recurring patterns"
        - "Anti-patterns discovered"
        - "Validated architecture principles"
        - "Business outcomes delivered"

    conventions:
      purpose: "Standards for logs, outputs, naming, structure"
      format: "Reference guide"
      contents:
        - "Folder structure diagrams"
        - "Naming conventions"
        - "Logs vs outputs definitions"
        - "Performance metrics standards"

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 7: LOGS VS OUTPUTS - CLEAR SEPARATION
  # ─────────────────────────────────────────────────────────────────────────

  - id: 7
    title: "Logs vs Outputs - Clear Separation"
    priority: "high"

    confidence_checkpoint:
      question: "Are logs and outputs clearly separated?"
      validation_checklist:
        - "Data files in /outputs, NOT /logs"
        - "Console output in /logs, NOT /outputs"
        - "Logs organized by layer subfolders"
        - "All log files timestamped"

    outputs_folder:
      purpose: "Data files consumed by downstream scripts or humans"
      contents:
        - "JSON files (extracted/processed data)"
        - "CSV files (reports, analysis)"
        - "Final deliverables"
      characteristics:
        - "Timeless (no timestamps in filenames)"
        - "Versioned via git (or documented if large)"
        - "Self-contained (schema clear from structure)"
        - "Consumed by other scripts or exported"
      naming: "Descriptive of content (e.g., all_conversations_by_lead.json)"

    logs_folder:
      purpose: "Execution traces for debugging, auditing, performance tracking"
      structure: |
        /logs
            /l1_{layer_name}
                {script_name}_{timestamp}.log
            /l2_{layer_name}
                {script_name}_{timestamp}.log
            /l3_{layer_name}
                {script_name}_{timestamp}.log

      contents:
        - "Console output (all printed messages)"
        - "Logical step logs ('Processing lead 100/978...')"
        - "Error traces and stack traces"
        - "Performance metrics (time, memory, API calls)"
        - "Timestamps for each operation"

      characteristics:
        - "Organized by LAYER (l1, l2, l3 subfolders)"
        - "Always timestamped"
        - "Ephemeral (can be deleted, add to .gitignore)"
        - "For agents/humans debugging"

      naming: "{script_name}_{YYYY-MM-DD_HH-mm-ss}.log"

    log_file_requirements:
      header:
        required: true
        format: |
          ═══════════════════════════════════════════════════════════════
          SCRIPT: {script_name}.ts
          ROUND: {round_number} - {round_name}
          LAYER: L{n} - {layer_description}
          STARTED: {iso_timestamp}
          ═══════════════════════════════════════════════════════════════

      logical_steps:
        required: true
        format: "[{timestamp}] {step_description}"
        examples:
          - "[10:55:22] 📂 Querying Firestore organizations/openinfo-cc02/emails"
          - "[10:55:24] Processing lead 100/978... (10.2%)"

      errors:
        required: "if_errors_occur"
        format: |
          [{timestamp}] ❌ ERROR: {error_message}
            Details: {error_details}
            Stack: {stack_trace}

      performance_metrics:
        required: true
        format: |
          ═══════════════════════════════════════════════════════════════
          PERFORMANCE METRICS:
          - Total Execution Time: {duration}s
          - Firestore/API Queries: {count}
          - Average Query Time: {avg_ms}ms
          - Peak Memory Usage: {memory} MB
          - Records Processed: {count}
          - Output File Size: {size} MB
          ═══════════════════════════════════════════════════════════════

      summary:
        required: true
        format: |
          ═══════════════════════════════════════════════════════════════
          COMPLETED: {iso_timestamp}
          DURATION: {duration} seconds
          STATUS: [✅ SUCCESS | ❌ FAILED]
          OUTPUT: {path_to_output_file}
          RECORDS: {summary_of_results}
          ═══════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 8: TEMPLATE FOR NEW ROUNDS
  # ─────────────────────────────────────────────────────────────────────────

  - id: 8
    title: "Template for New Rounds"
    priority: "medium"
    location: "/testing/_TEMPLATE_ROUND/"

    purpose: "Ensure consistency across all rounds"

    usage: |
      # Create new round
      cp -r _TEMPLATE_ROUND round_05_new_investigation

      # Edit templates
      cd round_05_new_investigation
      # Update README.md, learnings.md, INPUTS_MANIFEST.md, etc.

    structure: |
      /_TEMPLATE_ROUND
          /inputs
              INPUTS_MANIFEST.md (template with examples)
          /outputs
              .gitkeep
          /logs
              /l1_layer_name
                  .gitkeep
              /l2_layer_name
                  .gitkeep
              /l3_layer_name
                  .gitkeep
          /l1_layer_name
              example_script.ts (commented template)
              README.md (template)
          /l2_layer_name
              example_script.ts (commented template)
              README.md (template)
          /l3_layer_name
              example_script.ts (commented template)
              README.md (template)
          learnings.md (4-section template)
          README.md (round template)

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 9: PLANNING MODE & ULTRATHINKING MODE
  # ─────────────────────────────────────────────────────────────────────────

  - id: 9
    title: "Planning Mode & Ultrathinking Mode"
    priority: "critical"
    supersedes: "Execution - always plan before action"

    mandatory_protocol:
      before_any_script: "Execute full planning checklist"
      before_any_round: "Execute full planning checklist"
      before_any_decision: "Execute full planning checklist"

    planning_checklist:
      step_1_user_clarification:
        goal: "Achieve 95% confidence in requirements"
        questions:
          - "What is the business outcome? (one sentence)"
          - "What data sources will we query?"
          - "What is the expected output format?"
          - "What are the success criteria?"
          - "What are known edge cases?"
          - "What is the confidence target?"

      step_2_factual_constraints:
        goal: "Document reality"
        document:
          - "Data source structure (collections, fields, types)"
          - "Authentication requirements (API keys, tokens, etc.)"
          - "Rate limits (queries/second, records/page)"
          - "Data size (record counts, file sizes)"
          - "Dependencies (previous rounds, external APIs)"

      step_3_counterfactual_risks:
        goal: "Identify failure modes"
        scenarios:
          - "What if API times out?"
          - "What if data structure changes?"
          - "What if authentication expires?"
          - "What if no data matches query?"
          - "What if output file too large?"
          - "What if memory overflow?"

      step_4_edge_cases:
        goal: "List non-obvious scenarios"
        examples:
          - "Empty result sets"
          - "Malformed data (missing fields, wrong types)"
          - "Duplicate records"
          - "Circular dependencies"
          - "Pagination edge cases (last page, single record)"

      step_5_lean_validation:
        goal: "Check alignment with lean principles"
        checklist:
          - "✅ Minimal Viable Test first (small sample before full run)"
          - "✅ Fast Feedback (test mode with 10 records)"
          - "✅ Incremental Learning (build on previous rounds)"
          - "✅ Avoid Over-Engineering (don't build L3 if L1 sufficient)"

      step_6_business_alignment:
        goal: "Validate purpose"
        questions:
          - "How does this test advance business goals?"
          - "What decision will this enable?"
          - "What happens if we skip this test?"
          - "Is there a simpler way to achieve same outcome?"

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 10: SUBFOLDER ORGANIZATION
  # ─────────────────────────────────────────────────────────────────────────

  - id: 10
    title: "Subfolder Organization"
    priority: "medium"

    principle: |
      Within ANY working directory, organize into subfolders when >5 files exist.

    use_subfolders_for:
      - "Scripts → Layer folders (/l1_name/, /l2_name/)"
      - "Outputs → /outputs"
      - "Logs → /logs (with layer subfolders)"
      - "Docs → Embedded README.md per folder"
      - "Tests → /testing (with round structure)"

    flat_structure_ok_for:
      - "Simple projects <5 files"
      - "Single-purpose directories (already scoped)"

    example_good: |
      /project
          /l1_extraction
              extract_emails.ts
              extract_stats.ts
              README.md
          /l2_transformation
              transform_data.ts
              README.md
          /outputs
              final_data.json
          /logs
              /l1_extraction
                  extract_emails_2025-10-21.log
          README.md

    example_bad: |
      /project
          extract1.ts
          extract2.ts
          transform.ts
          output1.json
          log1.txt
          README.md

  # ─────────────────────────────────────────────────────────────────────────
  # COMMANDMENT 11: ASCII DIAGRAMS & VISUAL COMMUNICATION
  # ─────────────────────────────────────────────────────────────────────────

  - id: 11
    title: "ASCII Diagrams & Visual Communication"
    priority: "medium"

    principle: |
      Use ASCII art for faster human comprehension of structure and flow.

    when_to_use:
      - "Architecture diagrams (system overview)"
      - "Data flow diagrams (L1 → L2 → L3)"
      - "Dependency graphs (round dependencies)"
      - "Process flows (step-by-step procedures)"
      - "Banners and headers (emphasize importance)"

    example_data_flow: |
      ┌─────────────────────────────────────────────────────────────┐
      │  Round 4: Conversation Extraction                           │
      └─────────────────────────────────────────────────────────────┘
               │
               ├─→ L1: Full Email Thread Pull
               │   ├─ Input: Firestore organizations/emails
               │   └─ Output: raw_conversations.json
               │
               ├─→ L2: Reply Categorization
               │   ├─ Input: L1/outputs/raw_conversations.json
               │   └─ Output: categorized_replies.json
               │
               └─→ L3: Engagement Scoring
                   ├─ Input: L2/outputs/categorized_replies.json
                   └─ Output: scored_conversations.json

    formatting_standards:
      boxes: "Use ╔═══╗ ║   ║ ╚═══╝ for emphasis"
      lines: "Use ─── for separators"
      arrows: "Use → ← ↑ ↓ for flow direction"
      tree: "Use ├─ └─ for hierarchies"

