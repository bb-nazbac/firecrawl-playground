# EXAMPLES & BEST PRACTICES
# ═══════════════════════════════════════════════════════════════════════════

examples:

  confidence_scoring:

    scenario_1_high_confidence:
      task: "Extract all emails from Firestore organizations/emails collection"
      assessment:
        requirements_clarity: 98
        reasoning: "User specified exact output format, fields, and ordering"
        data_understanding: 95
        reasoning: "Tested with 10 sample records, structure validated"
        edge_cases: 92
        reasoning: "Documented empty threads, auth expiry, tested pagination"
        business_alignment: 97
        reasoning: "Enables conversation analysis (clear business value)"
        overall: 95.5
      decision: "✅ GO - Proceed with full extraction"
      actions:
        - "Run test mode (n=10) for final validation"
        - "Execute full extraction (n=978)"
        - "Document results in learnings.md"

    scenario_2_caution:
      task: "Categorize reply sentiment without ML model"
      assessment:
        requirements_clarity: 95
        reasoning: "User specified categories (positive, negative, neutral)"
        data_understanding: 90
        reasoning: "Have reply text, but no labeled training data"
        edge_cases: 75
        reasoning: "Manual rules may miss edge cases (sarcasm, context)"
        business_alignment: 90
        reasoning: "Sentiment useful for prioritization"
        overall: 87.5
      decision: "⚠️ CAUTION - Proceed with documented limitations"
      actions:
        - "Document rule-based approach limitations"
        - "Plan to revisit with ML model later"
        - "Validate sample outputs with user"
        - "Proceed with caution"

    scenario_3_no_go:
      task: "Build recommendation engine"
      assessment:
        requirements_clarity: 60
        reasoning: "Recommendation criteria unclear"
        data_understanding: 80
        reasoning: "Have contact data, but unclear what to recommend"
        edge_cases: 50
        reasoning: "Don't know success metrics or failure scenarios"
        business_alignment: 65
        reasoning: "Value proposition not articulated"
        overall: 63.75
      decision: "❌ NO-GO - Cannot proceed"
      clarifications_needed:
        - "What are we recommending? (Contacts? Actions? Products?)"
        - "What criteria determine good recommendation?"
        - "How do we measure success?"
        - "What's the business outcome enabled by this?"
      actions:
        - "STOP execution"
        - "Request comprehensive requirements from user"
        - "Re-assess after clarification"

  good_vs_bad:

    learnings_md:
      bad_example: |
        # Round 4 Learnings

        We extracted emails. It worked. Found 978 leads and 40 replies.
        Confidence: high.

      bad_reasons:
        - "No 4-section experimental format"
        - "No hypothesis stated"
        - "No 'why we're running this' context"
        - "Confidence not quantified (just 'high')"
        - "No next steps"

      good_example: |
        # Round 4: Conversation Extraction - Learnings

        **Date**: 2025-10-21
        **Status**: ✅ Complete
        **Overall Confidence**: 95%

        ## Non-Negotiable Statement

        We have business requirements that demand 95% confidence in data
        pipeline robustness. This round achieves confidence through:
        1. Systematic experimentation on Firestore emails collection
        2. Validation that conversation threading works correctly
        3. Complete understanding of sent/received message structure

        ## Experiment 1: Full Conversation Threading

        ### 1. What We're Testing

        **Endpoints/Collections**:
        - Firestore: organizations/openinfo-cc02/emails
        - Campaign: launchlist1

        **Expected Learning Outcome**:
        - Discover if received emails (replies) stored in same collection
        - Understand message threading structure
        - Validate chronological ordering

        **Techniques Used**:
        - Firestore document iteration (978 documents)
        - Message type filtering (sent vs received)
        - Thread ID correlation
        - Chronological sorting by timestamp

        **Hypothesis**:
        - emails collection contains BOTH sent AND received messages
        - Messages grouped by campaign thread
        - Type field distinguishes sent from received

        ### 2. Why We're Running This

        **Current Project Status**:
        - Round 03 extracted all sent emails (1,559)
        - No reply data found in initial extraction
        - User confirmed exchange with user@example.com exists

        **Current Knowledge Gaps**:
        - Where are received emails stored?
        - How are conversations threaded?
        - What metadata available for replies?

        **Why This Test Unblocks Progress**:
        - Cannot analyze engagement without reply data
        - Cannot build conversation view without threading
        - Business outcome requires complete interaction history

        ### 3. Results

        **What We Discovered**:
        - ✅ emails collection DOES contain both sent + received
        - ✅ Messages have type field: "sent" or "received"
        - ✅ Thread structure: email_threads.{campaign}.messages[]
        - ✅ Received messages include categories, automated flags
        - ⚠️ NOT all engaged leads have data (some missing)

        **Data Quality/Completeness**:
        - 978 lead documents queried
        - 1,599 total messages found (1,559 sent + 40 received)
        - 40 leads with replies (4.1% reply rate)
        - All messages have required fields (subject, body_text, timestamp)

        **Confidence Level**: 95% ✅
        - High confidence in data structure understanding
        - Validated with known example (user@example.com)
        - Cross-referenced with emailStats collection (consistent)

        **Unexpected Findings**:
        - Some replies truncated in body_text (character limit?)
        - Categories field auto-populated (ML categorization?)
        - Automated flag present but not consistently set

        ### 4. Conclusions & Next Steps

        **How Results Clarify Constraints**:
        - Reply data IS available in Firestore (no external API needed)
        - Threading is campaign-based (not email-thread-id based)
        - 4.1% reply rate is actual engagement (not data gap)

        **How Results Expand Possibilities**:
        - Can build complete conversation views
        - Can analyze reply categories for sentiment
        - Can track automated vs human responses

        **Validated Assumptions**:
        - ✅ Firestore is source of truth for email data
        - ✅ Sent and received in same location
        - ✅ Categorization already done (no manual work needed)

        **Invalidated Assumptions**:
        - ❌ Thought replies in separate collection
        - ❌ Assumed all engaged leads would appear here
        - ❌ Expected email-thread-id for threading

        **Next Experiment Required**:
        - Cross-reference superhuman collection for missing engaged leads
        - Analyze reply categories for business insights
        - Test character limit on body_text field

        ## Confidence Assessment

        | Component | Confidence | Status | Notes |
        |-----------|------------|--------|-------|
        | Input Data Understanding | 95% | ✅ | Firestore structure fully mapped |
        | Output Completeness | 90% | ⚠️ | 40 replies found, some may be missing |
        | Edge Case Coverage | 85% | ⚠️ | Need test auth expiry, rate limits |
        | Business Outcome Alignment | 95% | ✅ | Conversation data enables engagement analysis |

        **Overall Round Confidence: 91%** ✅

        **Confidence Boosters**:
        - User validation (user@example.com reply found)
        - Cross-reference validation (emailStats consistent)
        - Test mode successful (10 leads validated structure)

        **Confidence Blockers**:
        - Missing engagement data for some known engaged leads
        - Unclear if superhuman collection has additional replies

        **Path to 95%+**:
        - Cross-reference superhuman collection
        - Validate reply completeness with user

      good_reasons:
        - "Complete 4-section experimental format"
        - "Clear hypothesis and methodology"
        - "Quantified confidence (95%)"
        - "Documents both validated and invalidated assumptions"
        - "Clear next steps"
        - "Confidence assessment table with justifications"

